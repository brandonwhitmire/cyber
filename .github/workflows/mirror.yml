name: Auto Mirror Public Repo

on:
  # Run the mirror once per day at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Destination Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Preserve Workflow File
        # Save the workflow file before mirroring so it doesn't get overwritten
        run: |
          mkdir -p /tmp/preserve
          cp .github/workflows/mirror.yml /tmp/preserve/mirror.yml || true

      - name: Mirror Repository
        # Use a dedicated action for mirroring to avoid common pitfalls
        uses: actions/mirroring-action@v1.1
        with:
          # The repository to be mirrored
          source_repo: 'https://github.com/OpenSourceKyle/cyber.git'
          
          # The destination repository (the one this workflow runs in)
          target_repo: 'https://github.com/${{ github.repository }}.git'
          
          # The GITHUB_TOKEN is used for authentication automatically.
          # We need to provide it via a secret for the action to use.
          target_token: ${{ github.token }}

      - name: Restore Workflow File
        # Restore the workflow file if it was deleted or changed during mirroring
        run: |
          if [ -f /tmp/preserve/mirror.yml ]; then
            # Configure git for commits
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Fetch all branches after mirroring to get latest state
            git fetch origin --all --prune --force
            
            # Get the default branch name (try multiple methods)
            DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@' || echo "main")
            if [ -z "$DEFAULT_BRANCH" ] || [ "$DEFAULT_BRANCH" = "main" ]; then
              # Try to detect default branch from remote
              DEFAULT_BRANCH=$(git remote show origin | grep "HEAD branch" | cut -d' ' -f5 || echo "main")
            fi
            
            # Checkout the default branch (create tracking branch if needed)
            if git show-ref --verify --quiet "refs/remotes/origin/$DEFAULT_BRANCH"; then
              git checkout -f -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
            else
              echo "Warning: Could not find default branch, using current branch"
              git checkout -f $(git rev-parse --abbrev-ref HEAD)
            fi
            
            # Restore the workflow file
            mkdir -p .github/workflows
            cp /tmp/preserve/mirror.yml .github/workflows/mirror.yml
            
            # Check if the file changed and commit if needed
            if ! git diff --quiet .github/workflows/mirror.yml 2>/dev/null; then
              git add .github/workflows/mirror.yml
              git commit -m "chore: preserve mirror workflow file" || true
              git push origin "$DEFAULT_BRANCH" || true
              echo "Workflow file restored and committed to $DEFAULT_BRANCH."
            else
              echo "Workflow file unchanged, no commit needed."
            fi
          fi
